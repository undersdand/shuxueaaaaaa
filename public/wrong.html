<script>
// Render LaTeX math in a string to HTML
function renderMath(text) {
  if (!text) return '';
  let html = text;
  html = html.replace(/\\\((.+?)\\\)/g, (_, tex) => {
    try { return katex.renderToString(tex, { throwOnError: false, displayMode: false }); }
    catch { return tex; }
  });
  html = html.replace(/\$\$(.+?)\$\$/g, (_, tex) => {
    try { return katex.renderToString(tex, { throwOnError: false, displayMode: true }); }
    catch { return tex; }
  });
  html = html.replace(/\$(.+?)\$/g, (_, tex) => {
    try { return katex.renderToString(tex, { throwOnError: false, displayMode: false }); }
    catch { return tex; }
  });
  html = html.replace(/(\\(?:lim|frac|int|sum|sqrt|sin|cos|tan|ln|log|exp|limsup|liminf|infty|partial|nabla|alpha|beta|gamma|delta|epsilon|theta|lambda|mu|pi|sigma|omega|to|rightarrow|Rightarrow|leq|geq|neq|approx|equiv|subset|supset|cup|cap|in|notin|forall|exists|cdot|times|div|pm|mp|oplus|otimes|perp|parallel|angle|triangle|quad|qquad|overline|underline|hat|bar|vec|dot|ddot|tilde)[^ ,;。、]*)/g, (match) => {
    if (match.includes('\\') && (match.includes('{') || match.includes('_') || match.includes('^'))) {
      try { return katex.renderToString(match, { throwOnError: false, displayMode: false }); }
      catch { return match; }
    }
    return match;
  });
  return html;
}

const DIFF_COLORS = { easy: 'bg-secondary-container text-on-secondary-container', medium: 'bg-tertiary-container text-on-tertiary-container', hard: 'bg-error-container text-on-error-container' };
const DIFF_LABELS = { easy: '简单', medium: '中等', hard: '困难' };

async function loadWrongPage() {
  try {
    const [wrongRes, statsRes, chaptersRes] = await Promise.all([
      fetch('/api/wrong-answers'),
      fetch('/api/wrong-answers/stats'),
      fetch('/api/chapters')
    ]);

    const wrongAnswers = await wrongRes.json();
    const stats = await statsRes.json();
    const chapters = await chaptersRes.json();

    // Load all questions to resolve questionId references
    const allQuestions = [];
    for (const ch of chapters) {
      const qRes = await fetch(`/api/questions/${ch.id}`);
      const qs = await qRes.json();
      allQuestions.push(...qs);
    }

    // Update stats
    document.getElementById('total-wrong').textContent = stats.total;
    document.getElementById('review-count').textContent = wrongAnswers.filter(w => !w.reviewed).length;

    // Panda greeting
    const greetings = [
      `你已经收集了 ${stats.total} 道错题，继续加油！`,
      stats.total === 0 ? '目前没有错题，太棒了！' : `还有 ${wrongAnswers.filter(w => !w.reviewed).length} 道题需要复习哦~`
    ];
    document.getElementById('panda-greeting').textContent = greetings[stats.total > 0 ? 0 : 1];

    // Chapter distribution
    const distContainer = document.getElementById('chapter-dist');
    const maxCount = Math.max(1, ...Object.values(stats.byChapter));
    distContainer.innerHTML = chapters.map(ch => {
      const count = stats.byChapter[ch.id] || 0;
      const scale = count > 0 ? Math.max(0.1, count / maxCount) : 0.05;
      return `
        <div class="shrink-0 bg-white rounded-2xl p-4 shadow-sm border border-surface-variant w-32 flex flex-col gap-2 relative overflow-hidden">
          <div class="absolute bottom-0 left-0 h-1 w-full origin-left transition-transform" style="background-color: ${ch.color === 'primary' ? '#755563' : ch.color === 'secondary' ? '#416466' : '#665f31'}; transform: scaleX(${scale})"></div>
          <span class="text-xs font-label-bold text-outline">第${ch.id}章</span>
          <span class="font-body-sm font-bold truncate">${ch.title.substring(0, 6)}</span>
          <span class="text-lg font-bold mt-1" style="color: ${ch.color === 'primary' ? '#755563' : ch.color === 'secondary' ? '#416466' : '#665f31'}">${count}题</span>
        </div>
      `;
    }).join('');

    // Wrong answer list
    const listContainer = document.getElementById('wrong-list');
    const emptyState = document.getElementById('empty-state');

    if (wrongAnswers.length === 0) {
      emptyState.classList.remove('hidden');
      listContainer.classList.add('hidden');
    } else {
      emptyState.classList.add('hidden');
      listContainer.innerHTML = wrongAnswers.map(wa => {
        const q = allQuestions.find(q => q.id === wa.questionId);
        if (!q) return '';
        const ch = chapters.find(c => c.id === q.chapterId);
        const diffClass = DIFF_COLORS[q.difficulty] || DIFF_COLORS.medium;
        const diffLabel = DIFF_LABELS[q.difficulty] || q.difficulty;
        const labels = ['A', 'B', 'C', 'D'];

        return `
          <div class="bg-white rounded-[2rem] p-6 shadow-[0px_10px_30px_rgba(117,85,99,0.06)] border border-surface-variant relative ml-4">
            <div class="absolute top-4 right-4 ${diffClass} text-[10px] font-bold px-3 py-1 rounded-full">${diffLabel}</div>
            <p class="text-xs text-outline mb-1">第${q.chapterId}章${ch ? ' · ' + ch.title.substring(0, 6) : ''}</p>
            <p class="text-xs text-outline mb-3">考察点: ${q.topic || '-'}</p>
            <div class="bg-surface p-4 rounded-xl mb-4">
              <p class="font-body-math text-body-math text-on-surface">${renderMath(q.stem)}</p>
            </div>
            <div class="flex items-start gap-3 mb-4 p-3 bg-error-container/20 rounded-xl border border-error-container/50">
              <span class="material-symbols-outlined text-error mt-0.5" style="font-variation-settings:'FILL' 1">cancel</span>
              <div>
                <p class="text-xs text-error font-bold mb-1">你的答案</p>
                <p class="font-body-math text-body-math text-on-surface-variant">${labels[wa.userAnswer]}. ${renderMath(q.options[wa.userAnswer] || '-')}</p>
              </div>
            </div>
            <div class="flex items-start gap-3 mb-6 p-3 bg-green-50 rounded-xl border border-green-200">
              <span class="material-symbols-outlined text-green-600 mt-0.5" style="font-variation-settings:'FILL' 1">check_circle</span>
              <div>
                <p class="text-xs text-green-700 font-bold mb-1">正确答案</p>
                <p class="font-body-math text-body-math text-on-surface-variant">${labels[wa.correctAnswer]}. ${renderMath(q.options[wa.correctAnswer] || '-')}</p>
              </div>
            </div>
            <div class="flex gap-3">
              <button onclick="deleteWrong('${wa.id}')" class="flex-1 bg-white border-2 border-primary text-primary font-bold py-3 rounded-full hover:bg-primary/5 transition-colors active:scale-[0.98] shadow-sm flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-sm">check</span> 已掌握
              </button>
              <a href="practice.html?chapter=${q.chapterId}" class="flex-1 bg-primary text-white font-bold py-3 rounded-full hover:bg-primary/90 transition-colors active:scale-[0.98] shadow-[0_4px_12px_rgba(117,85,99,0.2)] flex items-center justify-center gap-2 no-underline">
                <span class="material-symbols-outlined text-sm">edit</span> 再试一次
              </a>
            </div>
          </div>
        `;
      }).join('');
    }
  } catch (err) {
    console.error('Failed to load wrong answers:', err);
    document.getElementById('panda-greeting').textContent = '加载失败，请刷新重试';
  }
}

async function deleteWrong(id) {
  try {
    await fetch(`/api/wrong-answers/${id}`, { method: 'DELETE' });
    loadWrongPage(); // Reload
  } catch (err) {
    console.error('Failed to delete:', err);
  }
}

loadWrongPage();
</script>
